<!-- CTA 가성비/할인 헌터 템플릿 (Level 2) -->
<!-- 가격 비교 강조, 긴급성 부여 -->

<!-- ── 상단: 상품 이미지 + 최저가 뱃지 + 가격 + 구매 버튼 ── -->
<div class="cp9-cta cp9-cta--header cp9-cta--hunter">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image" />
  <div class="cp9-cta__price-badge">
    <span>최저가 포착</span>
  </div>
  {{PRICE_BLOCK}}
  <p class="cp9-cta__sub-text">현재 확인 가능한 최저가입니다. 가격은 수시로 변동될 수 있습니다.</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--hunter">
    지금 쿠팡 최저가 잡기
  </a>
  <p class="cp9-cta__disclaimer">※ 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받을 수 있습니다.</p>
</div>

<!-- ── 하단: 긴급성 CTA ── -->
<div class="cp9-cta cp9-cta--footer cp9-cta--hunter">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image cp9-cta__image--footer" />
  <p class="cp9-cta__headline">할인 놓치면 후회합니다</p>
  {{URGENCY_BANNER}}
  <p class="cp9-cta__social-proof">{{SOCIAL_PROOF}}</p>
  <p class="cp9-cta__sub-text">가격 비교 분석 결과, 지금이 구매 적기입니다. 로켓배송으로 빠르게 받아보세요.</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--hunter cp9-cta__button--large">
    쿠팡 최저가 바로 구매
  </a>
  <p class="cp9-cta__disclaimer">※ 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받을 수 있습니다.</p>
</div>
