<!-- CTA 뷰티/패션 쇼퍼 템플릿 (Level 2) -->
<!-- 감성적이고 트렌디한 톤 -->

<!-- ── 상단: 상품 이미지 + 트렌드 뱃지 + 가격 + 구매 버튼 ── -->
<div class="cp9-cta cp9-cta--header cp9-cta--beauty">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image" />
  <div class="cp9-cta__trend-badge">
    <span>TRENDING NOW</span>
  </div>
  {{PRICE_BLOCK}}
  <p class="cp9-cta__sub-text">지금 가장 핫한 아이템을 놓치지 마세요.</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--beauty">
    쿠팡에서 최저가 쇼핑하기
  </a>
  <p class="cp9-cta__disclaimer">※ 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받을 수 있습니다.</p>
</div>

<!-- ── 하단: 감성형 CTA ── -->
<div class="cp9-cta cp9-cta--footer cp9-cta--beauty">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image cp9-cta__image--footer" />
  <p class="cp9-cta__headline">나를 위한 특별한 선택</p>
  {{URGENCY_BANNER}}
  <p class="cp9-cta__social-proof">{{SOCIAL_PROOF}}</p>
  <p class="cp9-cta__sub-text">실사용 후기와 전문가 리뷰를 모두 검증한 추천 아이템입니다.</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--beauty cp9-cta__button--large">
    쿠팡 최저가 확인하기
  </a>
  <p class="cp9-cta__disclaimer">※ 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받을 수 있습니다.</p>
</div>
