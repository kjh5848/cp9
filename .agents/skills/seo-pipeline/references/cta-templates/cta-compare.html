<!-- CTA 비교 분석형 템플릿 (Level 2) -->
<!-- 비교 글에 최적화: 객관적 분석 결과 강조 -->

<!-- ── 상단: 상품 이미지 + 비교 결과 뱃지 + 가격 + 구매 버튼 ── -->
<div class="cp9-cta cp9-cta--header cp9-cta--compare">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image" />
  <div class="cp9-cta__compare-badge">
    <span>비교 분석 완료</span>
  </div>
  {{PRICE_BLOCK}}
  <p class="cp9-cta__sub-text">여러 제품을 객관적으로 비교 분석한 결과, 가장 추천하는 제품입니다.</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--compare">
    쿠팡에서 비교 최저가 확인
  </a>
  <p class="cp9-cta__disclaimer">※ 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받을 수 있습니다.</p>
</div>

<!-- ── 하단: 비교 결론 CTA ── -->
<div class="cp9-cta cp9-cta--footer cp9-cta--compare">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image cp9-cta__image--footer" />
  <p class="cp9-cta__headline">전문가 비교 분석 결론</p>
  {{URGENCY_BANNER}}
  <p class="cp9-cta__social-proof">{{SOCIAL_PROOF}}</p>
  <p class="cp9-cta__sub-text">스펙, 가격, 실사용 후기를 종합 비교한 최종 추천입니다. 더 이상 고민하지 마세요.</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--compare cp9-cta__button--large">
    비교 결과 1위 상품 구매하기
  </a>
  <p class="cp9-cta__disclaimer">※ 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받을 수 있습니다.</p>
</div>
