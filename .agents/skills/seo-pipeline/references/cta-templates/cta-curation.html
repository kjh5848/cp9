<!-- CTA 큐레이션형 템플릿 (Level 2) -->
<!-- 큐레이션 글에 최적화: 에디터 픽 카드형 레이아웃 -->

<!-- ── 상단: 상품 이미지 + 에디터 픽 뱃지 + 가격 + 구매 버튼 ── -->
<div class="cp9-cta cp9-cta--header cp9-cta--curation">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image" />
  <div class="cp9-cta__editor-badge">
    <span>Editor's Pick</span>
  </div>
  {{PRICE_BLOCK}}
  <p class="cp9-cta__sub-text">수많은 제품 중 엄선한 에디터 추천 아이템입니다.</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--curation">
    쿠팡에서 추천 상품 확인하기
  </a>
  <p class="cp9-cta__disclaimer">※ 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받을 수 있습니다.</p>
</div>

<!-- ── 하단: 큐레이션 리스트 CTA ── -->
<div class="cp9-cta cp9-cta--footer cp9-cta--curation">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image cp9-cta__image--footer" />
  <p class="cp9-cta__headline">큐레이터 추천 리스트</p>
  {{URGENCY_BANNER}}
  <p class="cp9-cta__social-proof">{{SOCIAL_PROOF}}</p>
  <p class="cp9-cta__sub-text">트렌드와 실사용 데이터를 기반으로 엄선한 추천 목록입니다. 취향에 맞는 제품을 찾아보세요.</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--curation cp9-cta__button--large">
    전체 추천 리스트 보기
  </a>
  <p class="cp9-cta__disclaimer">※ 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받을 수 있습니다.</p>
</div>
