<!-- CTA 살림/인테리어 고수 템플릿 (Level 2) -->
<!-- 실용적이고 신뢰감 있는 톤 -->

<!-- ── 상단: 상품 이미지 + 실용 뱃지 + 가격 + 구매 버튼 ── -->
<div class="cp9-cta cp9-cta--header cp9-cta--living">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image" />
  <div class="cp9-cta__living-badge">
    <span>실생활 검증 완료</span>
  </div>
  {{PRICE_BLOCK}}
  <p class="cp9-cta__sub-text">실제 사용해보고 추천하는 제품입니다. 가격 대비 만족도가 높습니다.</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--living">
    쿠팡에서 최저가 확인하기
  </a>
  <p class="cp9-cta__disclaimer">※ 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받을 수 있습니다.</p>
</div>

<!-- ── 하단: 실용형 CTA ── -->
<div class="cp9-cta cp9-cta--footer cp9-cta--living">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image cp9-cta__image--footer" />
  <p class="cp9-cta__headline">살림 고수의 추천</p>
  {{URGENCY_BANNER}}
  <p class="cp9-cta__social-proof">{{SOCIAL_PROOF}}</p>
  <p class="cp9-cta__sub-text">오래 쓸 수 있고, 가격 대비 성능이 뛰어난 제품을 선별했습니다.</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--living cp9-cta__button--large">
    쿠팡 최저가 바로가기
  </a>
  <p class="cp9-cta__disclaimer">※ 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받을 수 있습니다.</p>
</div>
