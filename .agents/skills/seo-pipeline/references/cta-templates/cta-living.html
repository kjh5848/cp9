<!-- CTA 살림/인테리어 고수 템플릿 (Level 2) -->
<!-- 인라인 스타일 포함 — WP 테마 CSS 없이도 정상 렌더링 -->

<!-- ── 상단: 상품 이미지 + 실용 뱃지 + 가격 + 구매 버튼 ── -->
<div class="cp9-cta cp9-cta--header cp9-cta--living" style="max-width:680px;margin:2em auto;padding:28px 24px;border-radius:16px;text-align:center;background:linear-gradient(135deg,#f8f9ff 0%,#eef1ff 100%);border:1px solid #d4d9f7;color:#1a1a2e;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image" style="max-width:260px;height:auto;margin:0 auto 16px;border-radius:12px;display:block;background:#fff;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border:1px solid #eee;" />
  <div class="cp9-cta__living-badge" style="display:inline-block;background:rgba(34,197,94,0.08);color:#16a34a;padding:4px 16px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:12px;">
    <span>실생활 검증 완료</span>
  </div>
  {{PRICE_BLOCK}}
  <p class="cp9-cta__sub-text" style="font-size:14px;margin:8px 0;line-height:1.6;">실제 사용해보고 추천하는 제품입니다. 가격 대비 만족도가 높습니다.</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--living" style="display:inline-block;background:#2563eb;color:#fff!important;padding:14px 36px;border-radius:12px;font-size:16px;font-weight:700;text-decoration:none!important;margin:10px 0;box-shadow:0 4px 12px rgba(37,99,235,0.25);">
    쿠팡에서 최저가 확인하기
  </a>
  <p class="cp9-cta__disclaimer" style="font-size:11px;opacity:0.5;margin-top:14px;">※ 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받을 수 있습니다.</p>
</div>

<!-- ── 하단: 실용형 CTA ── -->
<div class="cp9-cta cp9-cta--footer cp9-cta--living" style="max-width:680px;margin:2em auto;padding:28px 24px;border-radius:16px;text-align:center;background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%);color:#fff;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image cp9-cta__image--footer" style="max-width:180px;height:auto;margin:0 auto 16px;border-radius:12px;display:block;background:#fff;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);" />
  <p class="cp9-cta__headline" style="font-size:20px;font-weight:800;margin:0 0 8px;">살림 고수의 추천</p>
  {{URGENCY_BANNER}}
  <p class="cp9-cta__social-proof" style="font-size:13px;opacity:0.85;margin:6px 0;">{{SOCIAL_PROOF}}</p>
  <p class="cp9-cta__sub-text" style="font-size:14px;opacity:0.9;margin:8px 0;line-height:1.6;">오래 쓸 수 있고, 가격 대비 성능이 뛰어난 제품을 선별했습니다.</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--living cp9-cta__button--large" style="display:inline-block;background:#2563eb;color:#fff!important;padding:18px 48px;border-radius:12px;font-size:18px;font-weight:700;text-decoration:none!important;margin:10px 0;box-shadow:0 4px 12px rgba(37,99,235,0.25);">
    쿠팡 최저가 바로가기
  </a>
  <p class="cp9-cta__disclaimer" style="font-size:11px;opacity:0.5;margin-top:14px;">※ 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받을 수 있습니다.</p>
</div>
