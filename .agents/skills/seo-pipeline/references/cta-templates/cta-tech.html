<!-- CTA IT/테크 전문가 템플릿 (Level 2) -->
<!-- 기술적이고 객관적인 톤, 스펙 요약 포함 -->

<!-- ── 상단: 상품 이미지 + 스펙 뱃지 + 가격 + 구매 버튼 ── -->
<div class="cp9-cta cp9-cta--header cp9-cta--tech">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image" />
  <div class="cp9-cta__spec-badge">
    <span>분석 완료</span>
  </div>
  {{PRICE_BLOCK}}
  <p class="cp9-cta__sub-text">위 스펙 분석 결과를 바탕으로, 해당 제품의 현재 최저가를 확인해 보세요.</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--tech">
    쿠팡에서 스펙 및 최저가 확인
  </a>
  <p class="cp9-cta__disclaimer">※ 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받을 수 있습니다.</p>
</div>

<!-- ── 하단: 결론형 CTA ── -->
<div class="cp9-cta cp9-cta--footer cp9-cta--tech">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image cp9-cta__image--footer" />
  <p class="cp9-cta__headline">테크 전문가의 결론</p>
  {{URGENCY_BANNER}}
  <p class="cp9-cta__social-proof">{{SOCIAL_PROOF}}</p>
  <p class="cp9-cta__sub-text">스펙과 실사용 데이터를 종합 분석한 결과, 현재 가격 대비 성능이 우수합니다.</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--tech cp9-cta__button--large">
    쿠팡 최저가 확인하기
  </a>
  <p class="cp9-cta__disclaimer">※ 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받을 수 있습니다.</p>
</div>
