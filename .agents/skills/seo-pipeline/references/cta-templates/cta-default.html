<!-- CTA 기본 템플릿 (Level 2) -->
<!-- 범용 CTA: 모든 페르소나의 기본 폴백 -->

<!-- ── 상단: 상품 이미지 + 가격 + 구매 버튼 ── -->
<div class="cp9-cta cp9-cta--header cp9-cta--default">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image" />
  {{PRICE_BLOCK}}
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button">
    쿠팡에서 최저가 확인하기
  </a>
  <p class="cp9-cta__disclaimer">※ 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받을 수 있습니다.</p>
</div>

<!-- ── 하단: 최종 CTA 블록 ── -->
<div class="cp9-cta cp9-cta--footer cp9-cta--default">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image cp9-cta__image--footer" />
  <p class="cp9-cta__headline">지금 바로 구매하세요!</p>
  {{URGENCY_BANNER}}
  <p class="cp9-cta__social-proof">{{SOCIAL_PROOF}}</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--large">
    쿠팡 최저가 바로가기
  </a>
  <p class="cp9-cta__disclaimer">※ 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받을 수 있습니다.</p>
</div>
