<!-- CTA 마스터 큐레이터 (럭셔리) 템플릿 (Level 2) -->
<!-- 인라인 스타일 포함 — WP 테마 CSS 없이도 정상 렌더링 -->

<!-- ── 상단: 상품 이미지 + 큐레이터 뱃지 + 가격 + 구매 버튼 ── -->
<div class="cp9-cta cp9-cta--header cp9-cta--luxury" style="max-width:680px;margin:2em auto;padding:28px 24px;border-radius:16px;text-align:center;background:linear-gradient(135deg,#faf5ff 0%,#f3e8ff 100%);border:1px solid #d8b4fe;color:#581c87;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image" style="max-width:260px;height:auto;margin:0 auto 16px;border-radius:12px;display:block;background:#fff;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border:1px solid #eee;" />
  <div class="cp9-cta__curator-badge" style="display:inline-block;background:rgba(147,51,234,0.08);color:#9333ea;padding:4px 16px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:12px;">
    <span>Curator's Pick</span>
  </div>
  {{PRICE_BLOCK}}
  <p class="cp9-cta__sub-text" style="font-size:14px;margin:8px 0;line-height:1.6;">전문 큐레이터가 엄선한 프리미엄 아이템입니다.</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--luxury" style="display:inline-block;background:#7c3aed;color:#fff!important;padding:14px 36px;border-radius:12px;font-size:16px;font-weight:700;text-decoration:none!important;margin:10px 0;box-shadow:0 4px 12px rgba(124,58,237,0.25);">
    쿠팡에서 프리미엄 가격 확인
  </a>
  <p class="cp9-cta__disclaimer" style="font-size:11px;opacity:0.5;margin-top:14px;">※ 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받을 수 있습니다.</p>
</div>

<!-- ── 하단: 프리미엄 CTA ── -->
<div class="cp9-cta cp9-cta--footer cp9-cta--luxury" style="max-width:680px;margin:2em auto;padding:28px 24px;border-radius:16px;text-align:center;background:linear-gradient(135deg,#3b0764 0%,#7c3aed 100%);color:#fff;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image cp9-cta__image--footer" style="max-width:180px;height:auto;margin:0 auto 16px;border-radius:12px;display:block;background:#fff;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);" />
  <p class="cp9-cta__headline" style="font-size:20px;font-weight:800;margin:0 0 8px;">마스터 큐레이터 H의 최종 추천</p>
  {{URGENCY_BANNER}}
  <p class="cp9-cta__social-proof" style="font-size:13px;opacity:0.85;margin:6px 0;">{{SOCIAL_PROOF}}</p>
  <p class="cp9-cta__sub-text" style="font-size:14px;opacity:0.9;margin:8px 0;line-height:1.6;">수백 개의 리뷰와 실사용 데이터를 거친 최종 선택. 프리미엄의 가치를 직접 경험해 보세요.</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--luxury cp9-cta__button--large" style="display:inline-block;background:#8b5cf6;color:#fff!important;padding:18px 48px;border-radius:12px;font-size:18px;font-weight:700;text-decoration:none!important;margin:10px 0;box-shadow:0 4px 12px rgba(139,92,246,0.3);">
    쿠팡에서 지금 확인하기
  </a>
  <p class="cp9-cta__disclaimer" style="font-size:11px;opacity:0.5;margin-top:14px;">※ 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받을 수 있습니다.</p>
</div>
