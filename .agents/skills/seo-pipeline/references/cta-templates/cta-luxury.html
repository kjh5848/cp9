<!-- CTA 마스터 큐레이터 (럭셔리) 템플릿 (Level 2) -->
<!-- 프리미엄 톤, 고급스러운 디자인 -->

<!-- ── 상단: 상품 이미지 + 큐레이터 뱃지 + 가격 + 구매 버튼 ── -->
<div class="cp9-cta cp9-cta--header cp9-cta--luxury">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image" />
  <div class="cp9-cta__curator-badge">
    <span>Curator's Pick</span>
  </div>
  {{PRICE_BLOCK}}
  <p class="cp9-cta__sub-text">전문 큐레이터가 엄선한 프리미엄 아이템입니다.</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--luxury">
    쿠팡에서 프리미엄 가격 확인
  </a>
  <p class="cp9-cta__disclaimer">※ 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받을 수 있습니다.</p>
</div>

<!-- ── 하단: 프리미엄 CTA ── -->
<div class="cp9-cta cp9-cta--footer cp9-cta--luxury">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image cp9-cta__image--footer" />
  <p class="cp9-cta__headline">마스터 큐레이터 H의 최종 추천</p>
  {{URGENCY_BANNER}}
  <p class="cp9-cta__social-proof">{{SOCIAL_PROOF}}</p>
  <p class="cp9-cta__sub-text">수백 개의 리뷰와 실사용 데이터를 거친 최종 선택. 프리미엄의 가치를 직접 경험해 보세요.</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--luxury cp9-cta__button--large">
    쿠팡에서 지금 확인하기
  </a>
  <p class="cp9-cta__disclaimer">※ 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받을 수 있습니다.</p>
</div>
