<!-- CTA 큐레이션형 템플릿 (Level 2) -->
<!-- 인라인 스타일 포함 — WP 테마 CSS 없이도 정상 렌더링 -->

<!-- ── 상단: 상품 이미지 + 에디터 픽 뱃지 + 가격 + 구매 버튼 ── -->
<div class="cp9-cta cp9-cta--header cp9-cta--curation" style="max-width:680px;margin:2em auto;padding:28px 24px;border-radius:16px;text-align:center;background:linear-gradient(135deg,#fff7ed 0%,#ffedd5 100%);border:1px solid #fdba74;color:#7c2d12;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image" style="max-width:260px;height:auto;margin:0 auto 16px;border-radius:12px;display:block;background:#fff;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border:1px solid #eee;" />
  <div class="cp9-cta__editor-badge" style="display:inline-block;background:rgba(234,88,12,0.08);color:#ea580c;padding:4px 16px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:12px;">
    <span>Editor's Pick</span>
  </div>
  {{PRICE_BLOCK}}
  <p class="cp9-cta__sub-text" style="text-align:center;font-size:14px;margin:8px 0;line-height:1.6;">수많은 제품 중 엄선한 에디터 추천 아이템입니다.</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--curation" style="display:inline-block;background:#ea580c;color:#fff!important;padding:14px 36px;border-radius:12px;font-size:16px;font-weight:700;text-decoration:none!important;margin:10px 0;box-shadow:0 4px 12px rgba(234,88,12,0.25);">
    쿠팡에서 추천 상품 확인하기
  </a>
</div>

<!-- ── 하단: 큐레이션 리스트 CTA ── -->
<div class="cp9-cta cp9-cta--footer cp9-cta--curation" style="max-width:680px;margin:2em auto;padding:28px 24px;border-radius:16px;text-align:center;background:linear-gradient(135deg,#7c2d12 0%,#ea580c 100%);color:#fff;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image cp9-cta__image--footer" style="max-width:180px;height:auto;margin:0 auto 16px;border-radius:12px;display:block;background:#fff;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);" />
  <p class="cp9-cta__headline" style="text-align:center;font-size:20px;font-weight:800;margin:0 0 8px;">큐레이터 추천 리스트</p>
  {{URGENCY_BANNER}}
  <p class="cp9-cta__social-proof" style="text-align:center;font-size:13px;opacity:0.85;margin:6px 0;">{{SOCIAL_PROOF}}</p>
  <p class="cp9-cta__sub-text" style="text-align:center;font-size:14px;opacity:0.9;margin:8px 0;line-height:1.6;">트렌드와 실사용 데이터를 기반으로 엄선한 추천 목록입니다. 취향에 맞는 제품을 찾아보세요.</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--curation cp9-cta__button--large" style="display:inline-block;background:#f97316;color:#fff!important;padding:18px 48px;border-radius:12px;font-size:18px;font-weight:700;text-decoration:none!important;margin:10px 0;box-shadow:0 4px 12px rgba(249,115,22,0.3);">
    전체 추천 리스트 보기
  </a>
</div>
