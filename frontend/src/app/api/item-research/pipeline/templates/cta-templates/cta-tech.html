<!-- CTA IT/테크 전문가 템플릿 (Level 2) -->
<!-- 인라인 스타일 포함 — WP 테마 CSS 없이도 정상 렌더링 -->

<!-- ── 상단: 상품 이미지 + 스펙 뱃지 + 가격 + 구매 버튼 ── -->
<div class="cp9-cta cp9-cta--header cp9-cta--tech" style="max-width:680px;margin:2em auto;padding:28px 24px;border-radius:16px;text-align:center;background:linear-gradient(135deg,#f0f9ff 0%,#e0f2fe 100%);border:1px solid #bae6fd;color:#0c4a6e;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image" style="max-width:260px;height:auto;margin:0 auto 16px;border-radius:12px;display:block;background:#fff;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border:1px solid #eee;" />
  <div class="cp9-cta__spec-badge" style="display:inline-block;background:rgba(2,132,199,0.1);color:#0284c7;padding:4px 16px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:12px;">
    <span>분석 완료</span>
  </div>
  {{PRICE_BLOCK}}
  <p class="cp9-cta__sub-text" style="text-align:center;font-size:14px;margin:8px 0;line-height:1.6;">위 스펙 분석 결과를 바탕으로, 해당 제품의 현재 최저가를 확인해 보세요.</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--tech" style="display:inline-block;background:#0284c7;color:#fff!important;padding:14px 36px;border-radius:12px;font-size:16px;font-weight:700;text-decoration:none!important;margin:10px 0;box-shadow:0 4px 12px rgba(2,132,199,0.25);">
    쿠팡에서 스펙 및 최저가 확인
  </a>
</div>

<!-- ── 하단: 결론형 CTA ── -->
<div class="cp9-cta cp9-cta--footer cp9-cta--tech" style="max-width:680px;margin:2em auto;padding:28px 24px;border-radius:16px;text-align:center;background:linear-gradient(135deg,#0c4a6e 0%,#0369a1 100%);color:#fff;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;">
  <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="cp9-cta__image cp9-cta__image--footer" style="max-width:180px;height:auto;margin:0 auto 16px;border-radius:12px;display:block;background:#fff;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);" />
  <p class="cp9-cta__headline" style="text-align:center;font-size:20px;font-weight:800;margin:0 0 8px;">테크 전문가의 결론</p>
  {{URGENCY_BANNER}}
  <p class="cp9-cta__social-proof" style="text-align:center;font-size:13px;opacity:0.85;margin:6px 0;">{{SOCIAL_PROOF}}</p>
  <p class="cp9-cta__sub-text" style="text-align:center;font-size:14px;opacity:0.9;margin:8px 0;line-height:1.6;">스펙과 실사용 데이터를 종합 분석한 결과, 현재 가격 대비 성능이 우수합니다.</p>
  <a href="{{BUY_URL}}" target="_blank" rel="noopener sponsored" class="cp9-cta__button cp9-cta__button--tech cp9-cta__button--large" style="display:inline-block;background:#0284c7;color:#fff!important;padding:18px 48px;border-radius:12px;font-size:18px;font-weight:700;text-decoration:none!important;margin:10px 0;box-shadow:0 4px 12px rgba(2,132,199,0.25);">
    쿠팡 최저가 확인하기
  </a>
</div>
