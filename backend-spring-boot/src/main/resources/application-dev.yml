# =====================================================
# 개발 환경 설정 (Development Environment)
# =====================================================

spring:
  config:
    activate:
      on-profile: dev
      
  # H2 데이터베이스 설정 (개발용)
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    hikari:
      pool-name: HikariCP-Dev
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      
  # H2 콘솔 활성화
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false
        
  # JPA 개발 환경 설정
  jpa:
    hibernate:
      ddl-auto: create-drop  # 개발 환경에서는 매번 테이블 재생성
    show-sql: true
    properties:
      hibernate:
        generate_statistics: true
        
  # Redis 개발 환경 설정
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          
  # DevTools 설정
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
      exclude: static/**,public/**
    livereload:
      enabled: true
      
  # Security OAuth2 개발 설정 (예시)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-dev-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-dev-client-secret}
            scope:
              - email
              - profile
          github:
            client-id: ${GITHUB_CLIENT_ID:your-dev-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:your-dev-client-secret}
            scope:
              - user:email
              - read:user
              
# =====================================================
# 서버 설정 (개발 환경)
# =====================================================
server:
  port: 8080
  error:
    include-stacktrace: always  # 개발 환경에서는 전체 스택 트레이스 표시
    
# =====================================================
# 액추에이터 설정 (개발 환경)
# =====================================================
management:
  endpoints:
    web:
      exposure:
        include: "*"  # 개발 환경에서는 모든 엔드포인트 노출
  endpoint:
    health:
      show-details: always
      
# =====================================================
# 로깅 설정 (개발 환경)
# =====================================================
logging:
  level:
    root: INFO
    com.cp9: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.engine.internal.StatisticalLoggingSessionEventListener: WARN  # Session Metrics 로그 억제
    org.hibernate.stat: WARN  # Hibernate 통계 로그 억제
    org.springframework.data.redis: DEBUG
  file:
    name: logs/cp9-dev.log
    max-size: 10MB
    max-history: 10
    
# =====================================================
# CORS 설정 (개발 환경)
# =====================================================
cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:5173
    - http://127.0.0.1:3000
    - http://127.0.0.1:5173
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
    - PATCH
  allowed-headers:
    - "*"
  exposed-headers:
    - Authorization
    - Content-Type
  allow-credentials: true
  max-age: 3600
  
# =====================================================
# Sentry 설정 (개발 환경)
# =====================================================
sentry:
  enabled: false  # 개발 환경에서는 Sentry 비활성화
  
# =====================================================
# Datadog 설정 (개발 환경)
# =====================================================
management.datadog:
  metrics:
    export:
      enabled: false  # 개발 환경에서는 Datadog 비활성화
      
# =====================================================
# 개발 환경 전용 설정
# =====================================================
app:
  environment: development
  debug: true
  mock-external-services: true  # 외부 서비스 모킹
  test-data:
    enabled: true  # 테스트 데이터 자동 생성
    user-count: 10
    post-count: 50