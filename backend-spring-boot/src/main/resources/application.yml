# =====================================================
# 공통 설정 (모든 환경에 적용)
# =====================================================
spring:
  application:
    name: cp9
    
  profiles:
    active: dev  # 기본 활성 프로파일 (dev, prod로 변경 가능)
    
  # JPA 공통 설정
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 100
        
  # Jackson 설정
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
      
  # 파일 업로드 설정
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 25MB
      
  # 캐시 설정
  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 1시간 (밀리초)
      
  # Redis 세션 설정
  session:
    store-type: redis
    redis:
      namespace: cp9:session
      flush-mode: on_save
    timeout: 30m
    
  # WebSocket 설정
  websocket:
    broker:
      relay:
        auto-startup: true
        
# =====================================================
# 서버 설정
# =====================================================
server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false
    
# =====================================================
# 액추에이터 설정
# =====================================================
management:
  endpoints:
    web:
      base-path: /management
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      
# =====================================================
# 로깅 설정
# =====================================================
logging:
  level:
    root: INFO
    com.cp9: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    
# =====================================================
# Spring AI (OpenAI) 설정
# =====================================================
spring.ai:
  openai:
    api-key: ${OPENAI_API_KEY:your-api-key-here}
    chat:
      options:
        model: gpt-3.5-turbo
        temperature: 0.7
        
# =====================================================
# JWT 설정
# =====================================================
jwt:
  secret: ${JWT_SECRET:mySecretKey-change-in-production-very-long-secret-key-for-jwt-token}
  access-token-validity: 900000      # 15분 (밀리초)
  refresh-token-validity: 604800000  # 7일 (밀리초)
  issuer: cp9-backend
  header-name: Authorization
  token-prefix: "Bearer "
  refresh-threshold: 300000          # 5분 (토큰 갱신 허용 시간)
  max-sessions: 3                    # 동시 세션 수
  remember-me-token-validity: 2592000000  # 30일 (Remember Me)

# =====================================================
# Spring Security 설정
# =====================================================
security:
  # 회원가입 설정
  registration:
    email-verification: true
    default-roles:
      - ROLE_USER
    admin-approval-required: false
    
  # 비밀번호 정책
  password:
    min-length: 8
    require-uppercase: true
    require-lowercase: true
    require-digit: true
    require-special: true
    
  # 역할 계층
  role-hierarchy:
    enabled: true
    definition: "ROLE_SUPER_ADMIN > ROLE_ADMIN > ROLE_MANAGER > ROLE_USER > ROLE_GUEST"

# =====================================================
# Rate Limiting 설정
# =====================================================
rate-limit:
  user:
    default-limit: 100
    window-duration: 3600  # 1시간
  admin:
    default-limit: 1000
    window-duration: 3600
  guest:
    default-limit: 20
    window-duration: 3600

# =====================================================
# Sentry 설정
# =====================================================
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${spring.profiles.active}
  traces-sample-rate: 0.1
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: info

# =====================================================
# SpringDoc OpenAPI 설정
# =====================================================
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    disable-swagger-default-url: true
    display-request-duration: true
    show-extensions: true
    show-common-extensions: true
  packages-to-scan:
    - com.cp9.infrastructure.web
  paths-to-match:
    - /api/**
  cache:
    disabled: false
  show-actuator: false
  group-configs:
    - group: "Auth API"
      paths-to-match: 
        - /api/auth/**
    - group: "User API"
      paths-to-match:
        - /api/user/**
    - group: "Admin API" 
      paths-to-match:
        - /api/admin/**