# =====================================================
# 프로덕션 환경 설정 (Production Environment)
# =====================================================

spring:
  config:
    activate:
      on-profile: prod
      
  # PostgreSQL 데이터베이스 설정 (프로덕션용)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cp9_prod}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: HikariCP-Prod
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 30000
      
  # JPA 프로덕션 환경 설정
  jpa:
    hibernate:
      ddl-auto: validate  # 프로덕션에서는 스키마 검증만 수행
    show-sql: false  # 프로덕션에서는 SQL 로그 비활성화
    properties:
      hibernate:
        generate_statistics: false
        batch_size: 25
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 25
          batch_versioned_data: true
          
  # Redis 프로덕션 환경 설정
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      database: 0
      ssl: ${REDIS_SSL:false}
      lettuce:
        pool:
          max-active: 20
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms
          
  # Security OAuth2 프로덕션 설정
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - user:email
              - read:user
    require-ssl: ${REQUIRE_SSL:true}
    
  # 압축 설정
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 365d
        use-last-modified: true
        
# =====================================================
# 서버 설정 (프로덕션 환경)
# =====================================================
server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types:
      - text/html
      - text/xml
      - text/plain
      - text/css
      - text/javascript
      - application/javascript
      - application/json
      - application/xml
    min-response-size: 1024
  http2:
    enabled: true
  error:
    include-stacktrace: never  # 프로덕션에서는 스택 트레이스 숨김
    include-message: never
    include-exception: false
  forward-headers-strategy: native
  tomcat:
    threads:
      max: 200
      min-spare: 10
    max-connections: 8192
    accept-count: 100
    connection-timeout: 20000
    
# =====================================================
# 액추에이터 설정 (프로덕션 환경)
# =====================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus  # 필요한 엔드포인트만 노출
  endpoint:
    health:
      show-details: never  # 프로덕션에서는 상세 정보 숨김
  health:
    redis:
      enabled: true
    db:
      enabled: true
  metrics:
    export:
      datadog:
        enabled: true
        api-key: ${DATADOG_API_KEY:}
        application-key: ${DATADOG_APPLICATION_KEY:}
        host-tag: ${HOSTNAME:cp9-backend}
        step: 60s
        
# =====================================================
# 로깅 설정 (프로덕션 환경)
# =====================================================
logging:
  level:
    root: WARN
    com.cp9: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  file:
    name: /app/logs/cp9-prod.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 3GB
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      clean-history-on-start: true
      
# =====================================================
# SSL/TLS 설정 (프로덕션 환경)
# =====================================================
server.ssl:
  enabled: ${SSL_ENABLED:false}
  key-store: ${SSL_KEY_STORE:}
  key-store-password: ${SSL_KEY_STORE_PASSWORD:}
  key-store-type: ${SSL_KEY_STORE_TYPE:PKCS12}
  key-alias: ${SSL_KEY_ALIAS:cp9}
  
# =====================================================
# CORS 설정 (프로덕션 환경)
# =====================================================
cors:
  allowed-origins:
    - ${FRONTEND_URL:https://yourdomain.com}
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
    - PATCH
  allowed-headers:
    - Authorization
    - Content-Type
    - X-Requested-With
  exposed-headers:
    - Authorization
    - Content-Type
  allow-credentials: true
  max-age: 86400
  
# =====================================================
# Sentry 설정 (프로덕션 환경)
# =====================================================
sentry:
  dsn: ${SENTRY_DSN}
  environment: production
  release: ${APP_VERSION:1.0.0}
  server-name: ${HOSTNAME:cp9-backend}
  traces-sample-rate: 0.01  # 프로덕션에서는 낮은 샘플링 비율
  logging:
    minimum-event-level: warn
    minimum-breadcrumb-level: info
    
# =====================================================
# Spring AI 설정 (프로덕션 환경)
# =====================================================
spring.ai:
  openai:
    api-key: ${OPENAI_API_KEY}
    chat:
      options:
        model: gpt-3.5-turbo
        temperature: 0.5  # 프로덕션에서는 낮은 temperature
        max-tokens: 1000
        top-p: 1.0
        
# =====================================================
# 프로덕션 환경 전용 설정
# =====================================================
app:
  environment: production
  debug: false
  mock-external-services: false
  rate-limit:
    enabled: true
    requests-per-minute: 100
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION:86400000}  # 24시간
    cors:
      max-age: 86400
  monitoring:
    health-check-interval: 30s
    metrics-collection-interval: 60s